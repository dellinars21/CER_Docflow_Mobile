// ── SEARCH ───────────────────────────────────────────────────────────────────
const IOS_KB_ROWS = [
  ["й","ц","у","к","е","н","г","ш","щ","з","х","ъ"],
  ["ф","ы","в","а","п","р","о","л","д","ж","э"],
  ["⇧","я","ч","с","м","и","т","ь","б","ю","⌫"],
];

function MSearch({ queue, signed, journal, onOpen, onClose }) {
  const [q, setQ] = useState("");
  const [filter, setFilter] = useState(null); // "queue" | "signed" | "journal" | null
  const inputRef = useRef(null);
  useEffect(() => { setTimeout(() => inputRef.current && inputRef.current.focus(), 120); }, []);

  const recentSearches = ["Заказ на покупку", "Гасанов", "Счёт за электроэнергию"];

  const filters = [
    { key: "queue",   label: "На подпись", tint: "#ff9500" },
    { key: "signed",  label: "Подписано",  tint: "#34c759" },
    { key: "journal", label: "Журнал",     tint: "#0a84ff" },
  ];

  const ql = q.toLowerCase().trim();
  const results = [];
  if (ql || filter) {
    if (!filter || filter === "queue") {
      for (const d of queue) {
        const p = senderOf(d);
        if (!ql || (d.title + d.subtitle + p.name).toLowerCase().includes(ql))
          results.push({ kind: "queue", doc: d, person: p });
      }
    }
    if (!filter || filter === "signed") {
      for (const d of signed) {
        const p = senderOf(d);
        if (!ql || (d.title + p.name).toLowerCase().includes(ql))
          results.push({ kind: "signed", doc: d, person: p });
      }
    }
    if (!filter || filter === "journal") {
      for (const j of journal) {
        const actor = USERS[j.actor] || PEOPLE[j.actor] || { name: j.actor };
        if (!ql || (j.title + j.detail + actor.name).toLowerCase().includes(ql))
          results.push({ kind: "journal", item: j, actor });
      }
    }
  }

  return (
    <div style={{ position: "absolute", inset: 0, zIndex: 80, display: "flex", flexDirection: "column", background: "var(--bg)" }}>
      {/* Search input at top */}
      <div style={{ flexShrink: 0, padding: "max(54px, calc(var(--sat) + 14px)) 16px 12px", background: "var(--bg)" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <div style={{ flex: 1, display: "flex", alignItems: "center", position: "relative" }}>
            <Icon name="search" size={17} style={{ position: "absolute", left: 12, color: "var(--text-3)" }} />
            <input ref={inputRef} value={q} onChange={(e) => setQ(e.target.value)} placeholder="Поиск документов"
              style={{ width: "100%", height: 42, padding: "0 38px 0 38px", borderRadius: 12, border: "none", background: "var(--surface-2)", fontSize: 16, fontFamily: "inherit", color: "var(--text)", outline: "none" }} />
            {q && <button onClick={() => setQ("")} style={{ position: "absolute", right: 10, width: 20, height: 20, borderRadius: "50%", border: "none", background: "var(--text-3)", color: "var(--bg)", display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", fontSize: 11, fontWeight: 700 }}>✕</button>}
          </div>
          <button onClick={onClose} style={{ border: "none", background: "transparent", color: "var(--accent)", fontSize: 16, fontWeight: 500, fontFamily: "inherit", cursor: "pointer", padding: "4px 2px", whiteSpace: "nowrap" }}>Отмена</button>
        </div>
      </div>

      {/* Filter tags */}
      <div style={{ flexShrink: 0, padding: "0 16px 10px", display: "flex", gap: 8, overflowX: "auto" }}>
        {filters.map((f) => {
          const on = filter === f.key;
          return (
            <button key={f.key} className="mTap" onClick={() => setFilter(on ? null : f.key)} style={{
              display: "inline-flex", alignItems: "center", gap: 6, padding: "7px 14px", borderRadius: 999,
              border: "none", cursor: "pointer", fontFamily: "inherit", fontSize: 14, fontWeight: 600, whiteSpace: "nowrap",
              background: on ? `color-mix(in srgb, ${f.tint} 18%, transparent)` : "var(--surface)",
              color: on ? f.tint : "var(--text-2)",
              boxShadow: on ? "none" : "0 0 0 .5px var(--border)",
              transition: "all .15s ease",
            }}>
              <span style={{ width: 8, height: 8, borderRadius: "50%", background: f.tint }} />
              {f.label}
            </button>
          );
        })}
      </div>

      {/* Results / recent */}
      <div style={{ flex: 1, overflow: "auto", padding: "0 16px 100px" }}>
        {!ql && !filter && (
          <div>
            <div style={{ fontSize: 13, fontWeight: 600, color: "var(--text-3)", textTransform: "uppercase", letterSpacing: ".04em", padding: "8px 4px 10px" }}>Недавние запросы</div>
            <MCard style={{ padding: "4px 0" }}>
              {recentSearches.map((term, i) => (
                <button key={term} onClick={() => setQ(term)} className="mTap" style={{
                  display: "flex", alignItems: "center", gap: 12, width: "100%", padding: "13px 16px",
                  border: "none", background: "transparent", cursor: "pointer", fontFamily: "inherit", textAlign: "left",
                  borderTop: i === 0 ? "none" : "1px solid var(--hairline)",
                }}>
                  <Icon name="clock" size={18} style={{ color: "var(--text-3)", flexShrink: 0 }} />
                  <span style={{ flex: 1, fontSize: 16, color: "var(--text)" }}>{term}</span>
                  <Icon name="chevR" size={16} style={{ color: "var(--text-3)" }} />
                </button>
              ))}
            </MCard>
          </div>
        )}
        {(ql || filter) && results.length === 0 && (
          <div style={{ textAlign: "center", padding: "60px 20px", color: "var(--text-3)" }}>
            <div style={{ fontSize: 16, fontWeight: 600, color: "var(--text-2)" }}>Ничего не найдено</div>
            <div style={{ fontSize: 14, marginTop: 4 }}>Попробуйте другой запрос</div>
          </div>
        )}
        {results.length > 0 && (
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {results.map((r, i) => {
              if (r.kind === "queue") return (
                <MCard key={"q" + r.doc.id} onClick={() => onOpen && onOpen(r.doc)} style={{ padding: 0, overflow: "hidden" }}>
                  <MDocHeader type={r.doc.type} time={r.doc.submitted} urgent={r.doc.priority === "Срочный"} />
                  <div style={{ display: "flex", gap: 12, alignItems: "center", padding: 13 }}>
                    <Avatar person={r.person} size={42} />
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontSize: 15.5, fontWeight: 700, color: "var(--text)", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{r.doc.title}</div>
                      <div style={{ fontSize: 13, color: "var(--text-3)" }}>{r.person.name}</div>
                    </div>
                    <StatusBadge kind="pending">Ожидает</StatusBadge>
                  </div>
                </MCard>
              );
              if (r.kind === "signed") return (
                <MCard key={"s" + r.doc.id + i} style={{ padding: 0, overflow: "hidden" }}>
                  <MDocHeader type={r.doc.type} time={r.doc.signed} />
                  <div style={{ display: "flex", gap: 12, alignItems: "center", padding: 13 }}>
                    <Avatar person={r.person} size={42} />
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontSize: 15.5, fontWeight: 700, color: "var(--text)", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{r.doc.title}</div>
                      <div style={{ fontSize: 13, color: "var(--text-3)" }}>{r.person.name}</div>
                    </div>
                    <StatusBadge kind="signed">Подписан</StatusBadge>
                  </div>
                </MCard>
              );
              if (r.kind === "journal") {
                const m = ACTION_META[r.item.action];
                return (
                  <MCard key={"j" + r.item.id} style={{ padding: 14 }}>
                    <div style={{ display: "flex", gap: 12, alignItems: "center" }}>
                      <div style={{ width: 40, height: 40, borderRadius: 10, background: `color-mix(in srgb, ${m.tint} 14%, transparent)`, color: m.tint, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                        {r.item.action === "notified" ? <TelegramGlyph size={22} /> : <Icon name={m.icon} size={19} />}
                      </div>
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ fontSize: 15, color: "var(--text)" }}><b style={{ fontWeight: 600 }}>{m.verb}</b> · {r.item.title}</div>
                        <div style={{ fontSize: 13, color: "var(--text-3)" }}>{r.actor.name} · {r.item.when}</div>
                      </div>
                    </div>
                  </MCard>
                );
              }
              return null;
            })}
          </div>
        )}
      </div>
    </div>
  );
}

Object.assign(window, { MBtn, MCard, MHeader, MQueue, MSigned, MJournal, MDocs, MProfile, MEmpty, MQueueCard, MSearch });

</script>
<script type="text/babel">
// leave-mobile.jsx — Leave & Absence requests (mobile iOS):
// type glyph, route stepper, request sheet flow, "Заявления" screen + detail.
const { useState: lUseState } = React;

// ── Type tile ────────────────────────────────────────────────────────────────
function MLeaveGlyph({ type, size = 44 }) {
  const t = LEAVE_TYPES[type];
  return (
    <div style={{ width: size, height: size, borderRadius: size * 0.27, flexShrink: 0, background: `color-mix(in srgb, ${t.tint} 15%, transparent)`, color: t.tint, display: "flex", alignItems: "center", justifyContent: "center" }}>
      <Icon name={t.icon} size={Math.round(size * 0.54)} stroke={1.9} />
    </div>
  );
}

// ── Route stepper (shared logic) ─────────────────────────────────────────────
const MROUTE_SHORT = ["Кадры", "Рук.", "Зам.", "Дир.", "Приказ"];
function mRouteState(i, stage, status) {
  if (status === "approved") return "done";
  if (status === "declined") return i < stage ? "done" : i === stage ? "declined" : "skip";
  return i < stage ? "done" : i === stage ? "current" : "pending";
}
function MStepNode({ state, n, size = 24 }) {
  const base = { width: size, height: size, borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, fontSize: 11, fontWeight: 700 };
  if (state === "done") return <div style={{ ...base, background: "#34c759", color: "#fff" }}><Icon name="check" size={13} stroke={3} /></div>;
  if (state === "declined") return <div style={{ ...base, background: "#ff3b30", color: "#fff" }}><Icon name="x" size={12} stroke={3} /></div>;
  if (state === "current") return <div style={{ ...base, background: "var(--surface)", border: "2px solid var(--accent)" }}><span className="mFieldPulse" style={{ width: 8, height: 8, borderRadius: "50%", background: "var(--accent)" }} /></div>;
  return <div style={{ ...base, background: "var(--surface-2)", border: "1.5px solid var(--border)", color: "var(--text-3)" }}>{n}</div>;
}
function MRouteStepper({ stage, status, showLabels = true, preview = false }) {
  return (
    <div style={{ display: "flex", alignItems: "flex-start", width: "100%" }}>
      {LEAVE_ROUTE.map((st, i) => {
        const state = preview ? "pending" : mRouteState(i, stage, status);
        const leftDone = i > 0 && (status === "approved" || (i <= stage && status !== "declined"));
        const rightDone = (status === "approved") || (status !== "declined" && i < stage);
        const lineCol = (f) => f && !preview ? "#34c759" : "var(--hairline)";
        return (
          <div key={st.key} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", minWidth: 0 }}>
            <div style={{ display: "flex", alignItems: "center", width: "100%" }}>
              <div style={{ flex: 1, height: 2, background: i === 0 ? "transparent" : lineCol(leftDone), borderRadius: 2 }} />
              <MStepNode state={state} n={i + 1} />
              <div style={{ flex: 1, height: 2, background: i === LEAVE_ROUTE.length - 1 ? "transparent" : lineCol(rightDone), borderRadius: 2 }} />
            </div>
            {showLabels && (
              <span style={{ marginTop: 6, fontSize: 10.5, textAlign: "center", lineHeight: 1.15, fontWeight: state === "current" ? 700 : 500, color: state === "current" ? "var(--accent)" : state === "declined" ? "#c01a12" : state === "done" ? "var(--text-2)" : "var(--text-3)" }}>{MROUTE_SHORT[i]}</span>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ── Status pill ──────────────────────────────────────────────────────────────
function MLeaveStatus({ req }) {
  if (req.status === "approved") return <span style={mPill("#1d7a36", "rgba(52,199,89,.16)")}><Icon name="checkCircle" size={14} /> Одобрено</span>;
  if (req.status === "declined") return <span style={mPill("#c01a12", "rgba(255,59,48,.14)")}><Icon name="x" size={13} stroke={2.6} /> Отклонено</span>;
  return <span style={mPill("#0a6cff", "rgba(10,132,255,.13)")}><span className="mFieldPulse" style={{ width: 7, height: 7, borderRadius: "50%", background: "#0a6cff" }} /> В маршруте</span>;
}
function mPill(color, bg) {
  return { display: "inline-flex", alignItems: "center", gap: 6, padding: "4px 10px", borderRadius: 999, background: bg, color, fontSize: 12.5, fontWeight: 600, whiteSpace: "nowrap" };
}

// ════════════════ "ЗАЯВЛЕНИЯ" SCREEN ════════════════
function MRequests({ requests, onNew, onOpen }) {
  const remaining = LEAVE_BALANCE.total - LEAVE_BALANCE.used;
  const active = requests.filter((r) => r.status === "in_progress").length;
  return (
    <>
      <MHeader title="Заявления" sub="Отпуск и отсутствие" logo
        right={<button className="mTap" onClick={onNew} style={{ width: 44, height: 44, borderRadius: "50%", border: "none", background: "var(--accent)", color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", boxShadow: "0 3px 12px rgba(10,132,255,.35)" }}><Icon name="plus" size={24} stroke={2.4} /></button>} />
      <div style={{ flex: 1, overflow: "auto", padding: "8px 16px 100px", display: "flex", flexDirection: "column", gap: 12 }}>
        {/* balance strip */}
        <div style={{ display: "flex", gap: 12 }}>
          <MMini icon="sun" tint="#34c759" big={remaining} unit="дн." label="Ежегодный отпуск" />
          <MMini icon="route" tint="#0a84ff" big={active} unit="" label="В маршруте" />
        </div>
        {requests.map((req) => {
          const lt = LEAVE_TYPES[req.type];
          return (
            <MCard key={req.id} onClick={() => onOpen(req)} style={{ padding: 15, display: "flex", flexDirection: "column", gap: 14 }}>
              <div style={{ display: "flex", gap: 13, alignItems: "center" }}>
                <MLeaveGlyph type={req.type} size={44} />
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 16, fontWeight: 600, color: "var(--text)", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{lt.short}</div>
                  <div style={{ fontSize: 13, color: "var(--text-2)" }}>{fmtRange(req.start, req.end)} · {daysLabel(daysBetween(req.start, req.end))}</div>
                </div>
                <MLeaveStatus req={req} />
              </div>
              <MRouteStepper stage={req.stage} status={req.status} />
            </MCard>
          );
        })}
      </div>
    </>
  );
}
function MMini({ icon, tint, big, unit, label }) {
  return (
    <MCard style={{ flex: 1, padding: 14, display: "flex", alignItems: "center", gap: 11 }}>
      <div style={{ width: 40, height: 40, borderRadius: 11, background: `color-mix(in srgb, ${tint} 14%, transparent)`, color: tint, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}><Icon name={icon} size={22} stroke={1.9} /></div>
      <div style={{ minWidth: 0 }}>
        <div style={{ fontSize: 20, fontWeight: 700, color: "var(--text)", lineHeight: 1.1 }}>{big}<span style={{ fontSize: 12, fontWeight: 500, color: "var(--text-2)", marginLeft: 3 }}>{unit}</span></div>
        <div style={{ fontSize: 12, color: "var(--text-3)" }}>{label}</div>
      </div>
    </MCard>
  );
}

// ════════════════ REQUEST SHEET FLOW ════════════════
function MLeaveSheet({ onClose, onSubmit }) {
  const [step, setStep] = lUseState(1);
  const [type, setType] = lUseState(null);
  const [start, setStart] = lUseState("");
  const [end, setEnd] = lUseState("");
  const [note, setNote] = lUseState("");

  const days = daysBetween(start, end);
  const remaining = LEAVE_BALANCE.total - LEAVE_BALANCE.used;
  const isAnnual = type === "annual";
  const overdrawn = isAnnual && days > remaining;
  const canSubmit = type && start && end && days > 0 && !overdrawn;

  const submit = () => {
    onSubmit({ id: "REQ-" + (119 + Math.floor(Math.random() * 60)), type, start, end, note, submitted: "Только что", stage: 0, status: "in_progress", times: ["Только что", null, null, null, null] });
    setStep(3);
  };

  const footer = step === 1
    ? <MBtn kind="primary" full disabled={!type} onClick={() => setStep(2)}>Далее</MBtn>
    : step === 2
      ? <div style={{ display: "flex", gap: 10 }}><MBtn kind="secondary" onClick={() => setStep(1)} style={{ flex: "0 0 auto" }}>Назад</MBtn><MBtn kind="primary" icon="send" full disabled={!canSubmit} onClick={submit}>На согласование</MBtn></div>
      : <MBtn kind="primary" full onClick={onClose}>Готово</MBtn>;

  const dateStyle = { width: "100%", height: 50, padding: "0 14px", borderRadius: 14, border: "1px solid var(--border)", background: "var(--surface)", fontSize: 15, fontFamily: "inherit", color: "var(--text)", outline: "none", boxSizing: "border-box", colorScheme: "light" };

  return (
    <MSheet onClose={onClose} title={step === 3 ? null : "Заявление на отсутствие"} footer={footer}>
      {/* STEP 1 — type */}
      {step === 1 && (
        <div style={{ display: "flex", flexDirection: "column", gap: 18, paddingBottom: 12 }}>
          {LEAVE_GROUPS.map((group) => (
            <div key={group}>
              <div style={MSecLabel}>{group}</div>
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                {Object.values(LEAVE_TYPES).filter((lt) => lt.group === group).map((lt) => {
                  const on = type === lt.key;
                  return (
                    <button key={lt.key} className="mTap" onClick={() => setType(lt.key)} style={{ display: "flex", alignItems: "center", gap: 13, padding: 13, borderRadius: 16, cursor: "pointer", textAlign: "left", fontFamily: "inherit", width: "100%", border: on ? "2px solid var(--accent)" : "2px solid transparent", background: on ? "var(--accent-weak)" : "var(--surface)" }}>
                      <MLeaveGlyph type={lt.key} size={42} />
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ fontSize: 15.5, fontWeight: 600, color: "var(--text)" }}>{lt.short}</div>
                        <div style={{ fontSize: 12.5, color: "var(--text-3)" }}>{lt.hint}</div>
                      </div>
                      <span style={{ width: 22, height: 22, borderRadius: "50%", border: on ? "none" : "2px solid var(--border)", background: on ? "var(--accent)" : "transparent", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>{on && <Icon name="check" size={13} stroke={3} style={{ color: "#fff" }} />}</span>
                    </button>
                  );
                })}
              </div>
            </div>
          ))}
        </div>
      )}

      {/* STEP 2 — dates + route */}
      {step === 2 && type && (
        <div style={{ display: "flex", flexDirection: "column", gap: 18, paddingBottom: 12 }}>
          <MCard style={{ display: "flex", alignItems: "center", gap: 12, padding: 13 }}>
            <MLeaveGlyph type={type} size={40} />
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontSize: 15, fontWeight: 600, color: "var(--text)" }}>{LEAVE_TYPES[type].short}</div>
              <div style={{ fontSize: 12.5, color: "var(--text-3)" }}>{LEAVE_TYPES[type].hint}</div>
            </div>
            <button onClick={() => setStep(1)} style={{ border: "none", background: "transparent", color: "var(--accent)", fontFamily: "inherit", fontSize: 13.5, fontWeight: 600, cursor: "pointer" }}>Изменить</button>
          </MCard>

          {isAnnual && (
            <MCard style={{ padding: 15 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 9 }}>
                <span style={{ fontSize: 14, fontWeight: 600, color: "var(--text)" }}>Остаток отпуска</span>
                <span style={{ fontSize: 14, color: "var(--text-2)" }}><b style={{ color: "var(--text)", fontSize: 16 }}>{remaining}</b> из {LEAVE_BALANCE.total} дн.</span>
              </div>
              <div style={{ height: 8, borderRadius: 999, background: "var(--surface-2)", overflow: "hidden", display: "flex" }}>
                <div style={{ width: `${(LEAVE_BALANCE.used / LEAVE_BALANCE.total) * 100}%`, background: "var(--border)" }} />
                <div style={{ width: `${(Math.min(days, remaining) / LEAVE_BALANCE.total) * 100}%`, background: overdrawn ? "#ff3b30" : "#34c759" }} />
              </div>
              <div style={{ marginTop: 8, fontSize: 12.5, color: overdrawn ? "#c01a12" : "var(--text-3)" }}>
                {days > 0 ? (overdrawn ? `Запрошено ${daysLabel(days)} — превышает остаток` : `Запрошено ${daysLabel(days)} · останется ${remaining - days} дн.`) : "Выберите даты ниже"}
              </div>
            </MCard>
          )}

          <div>
            <div style={MSecLabel}>Период отсутствия</div>
            <div style={{ display: "flex", gap: 10, alignItems: "flex-end" }}>
              <label style={{ flex: 1 }}>
                <span style={{ display: "block", fontSize: 12, color: "var(--text-3)", marginBottom: 5 }}>Начало</span>
                <input type="date" value={start} min="2026-06-10" onChange={(e) => { setStart(e.target.value); if (end && e.target.value > end) setEnd(e.target.value); }} style={dateStyle} />
              </label>
              <label style={{ flex: 1 }}>
                <span style={{ display: "block", fontSize: 12, color: "var(--text-3)", marginBottom: 5 }}>Окончание</span>
                <input type="date" value={end} min={start || "2026-06-10"} onChange={(e) => setEnd(e.target.value)} style={dateStyle} />
              </label>
            </div>
            {days > 0 && (
              <div style={{ marginTop: 10, display: "inline-flex", alignItems: "center", gap: 7, padding: "7px 13px", borderRadius: 999, background: "var(--accent-weak)", color: "var(--accent)", fontSize: 13, fontWeight: 600 }}>
                <Icon name="calCheck" size={15} /> {fmtRange(start, end)} · {daysLabel(days)}
              </div>
            )}
          </div>

          <div>
            <div style={MSecLabel}>Причина (необязательно)</div>
            <textarea value={note} onChange={(e) => setNote(e.target.value)} rows={2} placeholder="Например: семейные обстоятельства"
              style={{ width: "100%", padding: "13px 15px", borderRadius: 16, border: "1px solid var(--border)", background: "var(--surface)", fontSize: 15, fontFamily: "inherit", color: "var(--text)", resize: "none", outline: "none", lineHeight: 1.5, boxSizing: "border-box" }} />
          </div>

          {/* route notice */}
          <MCard style={{ padding: 16, background: "var(--surface-2)" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 13 }}>
              <Icon name="route" size={18} style={{ color: "var(--accent)" }} />
              <span style={{ fontSize: 14.5, fontWeight: 700, color: "var(--text)" }}>Маршрут согласования</span>
            </div>
            <MRouteStepper preview />
            <p style={{ margin: "14px 0 0", fontSize: 13, color: "var(--text-2)", lineHeight: 1.5 }}>
              После отправки: <b style={{ color: "var(--text)" }}>Отдел кадров → Руководитель отдела → Зам. по проектированию → Директор → Издание приказа</b>. На каждом этапе согласующий получит уведомление.
            </p>
          </MCard>
        </div>
      )}

      {/* STEP 3 — success */}
      {step === 3 && (
        <div style={{ textAlign: "center", padding: "18px 6px 24px" }}>
          <div className="popIn" style={{ width: 72, height: 72, borderRadius: "50%", background: "#34c759", display: "inline-flex", alignItems: "center", justifyContent: "center", marginBottom: 16 }}><Icon name="check" size={38} stroke={2.6} style={{ color: "#fff" }} /></div>
          <h2 style={{ margin: "0 0 8px", fontSize: 22, fontWeight: 700, color: "var(--text)" }}>Заявление отправлено</h2>
          <p style={{ margin: "0 auto 20px", maxWidth: 290, fontSize: 14.5, color: "var(--text-2)", lineHeight: 1.5 }}>Поступило в <b style={{ color: "var(--text)" }}>Отдел кадров</b>. Следите за маршрутом во вкладке «Заявления».</p>
          <div style={{ padding: "0 6px" }}><MRouteStepper stage={0} status="in_progress" /></div>
        </div>
      )}
    </MSheet>
  );
}

// ════════════════ REQUEST DETAIL (full screen) ════════════════
function MRequestDetail({ req, onClose }) {
  const lt = LEAVE_TYPES[req.type];
  return (
    <div className="fadeIn" style={{ position: "absolute", inset: 0, zIndex: 90, background: "var(--bg)", display: "flex", flexDirection: "column" }}>
      <div style={{ paddingTop: "max(50px, calc(var(--sat) + 12px))", paddingBottom: 12, paddingLeft: 12, paddingRight: 16, display: "flex", alignItems: "center", gap: 8, background: "var(--surface)", borderBottom: "1px solid var(--hairline)", flexShrink: 0 }}>
        <button className="mTap" onClick={onClose} style={{ display: "flex", alignItems: "center", gap: 2, border: "none", background: "transparent", color: "var(--accent)", fontFamily: "inherit", fontSize: 17, fontWeight: 500, cursor: "pointer", padding: 4 }}>
          <Icon name="chevR" size={22} style={{ transform: "rotate(180deg)" }} /> Назад
        </button>
        <div style={{ flex: 1, minWidth: 0, textAlign: "center" }}>
          <div style={{ fontSize: 16, fontWeight: 600, color: "var(--text)", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{lt.short}</div>
          <div style={{ fontSize: 12.5, color: "var(--text-3)" }}>{req.id}</div>
        </div>
        <div style={{ width: 60 }} />
      </div>

      <div style={{ flex: 1, overflow: "auto", padding: "18px 18px 40px" }}>
        <MCard style={{ padding: 16, marginBottom: 18 }}>
          <div style={{ display: "flex", gap: 13, alignItems: "center", marginBottom: 14 }}>
            <MLeaveGlyph type={req.type} size={46} />
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontSize: 16.5, fontWeight: 600, color: "var(--text)" }}>{lt.label}</div>
              <div style={{ fontSize: 13.5, color: "var(--text-2)" }}>{fmtRange(req.start, req.end)} · {daysLabel(daysBetween(req.start, req.end))}</div>
            </div>
          </div>
          <MLeaveStatus req={req} />
          {req.orderNo && req.status === "approved" && <span style={{ marginLeft: 8, ...mPill("#1d7a36", "rgba(52,199,89,.12)") }}><Icon name="stamp" size={14} /> Приказ {req.orderNo}</span>}
          {req.note && <div style={{ marginTop: 13, padding: "11px 14px", borderRadius: 12, background: "var(--surface-2)", fontSize: 13.5, color: "var(--text-2)", lineHeight: 1.5 }}><span style={{ color: "var(--text-3)", fontWeight: 600 }}>Комментарий: </span>{req.note}</div>}
        </MCard>

        <div style={{ ...MSecLabel, padding: "0 4px 12px" }}>Маршрут согласования</div>
        <MCard style={{ padding: "18px 16px" }}>
          {LEAVE_ROUTE.map((st, i) => {
            const state = mRouteState(i, req.stage, req.status);
            const last = i === LEAVE_ROUTE.length - 1;
            const lineCol = state === "done" ? "#34c759" : "var(--hairline)";
            return (
              <div key={st.key} style={{ display: "flex", gap: 14 }}>
                <div style={{ display: "flex", flexDirection: "column", alignItems: "center", flexShrink: 0 }}>
                  <MStepNode state={state} n={i + 1} size={26} />
                  {!last && <div style={{ width: 2, flex: 1, minHeight: 30, background: lineCol, borderRadius: 2 }} />}
                </div>
                <div style={{ flex: 1, minWidth: 0, paddingBottom: last ? 0 : 16 }}>
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 8 }}>
                    <span style={{ fontSize: 15, fontWeight: 600, color: (state === "pending" || state === "skip") ? "var(--text-3)" : "var(--text)" }}>{st.label}</span>
                    {req.times[i] && <span style={{ fontSize: 12, color: "var(--text-3)", whiteSpace: "nowrap" }}>{req.times[i]}</span>}
                  </div>
                  <div style={{ fontSize: 13, color: "var(--text-2)", marginTop: 1 }}>{st.task}</div>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 8 }}>
                    <Avatar person={st.person} size={24} />
                    <span style={{ fontSize: 13, color: "var(--text-2)" }}>{st.person.name}</span>
                    {state === "current" && <span style={{ marginLeft: "auto", display: "inline-flex", alignItems: "center", gap: 5, fontSize: 12.5, fontWeight: 600, color: "var(--accent)" }}><span className="mFieldPulse" style={{ width: 7, height: 7, borderRadius: "50%", background: "var(--accent)" }} /> На рассмотрении</span>}
                    {state === "done" && <Icon name="check" size={15} stroke={2.6} style={{ marginLeft: "auto", color: "#34c759" }} />}
                    {state === "declined" && <span style={{ marginLeft: "auto", fontSize: 12.5, fontWeight: 600, color: "#c01a12" }}>Отклонил</span>}
                  </div>
                  {state === "declined" && req.declineNote && <div style={{ marginTop: 9, padding: "10px 13px", borderRadius: 11, background: "rgba(255,59,48,.08)", border: "1px solid rgba(255,59,48,.2)", fontSize: 13, color: "#a51810", lineHeight: 1.5 }}>{req.declineNote}</div>}
                </div>
              </div>
            );
          })}
        </MCard>
      </div>
    </div>
  );
}

Object.assign(window, { MLeaveGlyph, MRouteStepper, MStepNode, mRouteState, MLeaveStatus, MRequests, MMini, MLeaveSheet, MRequestDetail });

</script>
<script type="text/babel">
// mobile-shell.jsx — mobile signing screen, bottom sheets, tab bar, root + mount.
const { useState: mUseState, useRef: mUseRef, useEffect: mUseEffect, useCallback: mUseCallback } = React;

// ── Bottom sheet wrapper ─────────────────────────────────────────────────────
function MSheet({ onClose, title, children, footer }) {
  return (
    <div className="fadeIn" onClick={onClose} style={{ position: "absolute", inset: 0, zIndex: 80, background: "rgba(0,0,0,.42)", display: "flex", alignItems: "flex-end" }}>
      <div className="sheetUp" onClick={(e) => e.stopPropagation()} style={{ width: "100%", maxHeight: "94%", background: "var(--bg)", borderRadius: "26px 26px 0 0", display: "flex", flexDirection: "column", overflow: "hidden" }}>
        <div style={{ display: "flex", justifyContent: "center", padding: "10px 0 4px", flexShrink: 0 }}>
          <div style={{ width: 38, height: 5, borderRadius: 9, background: "rgba(0,0,0,.16)" }} />
        </div>
        {title && (
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "4px 20px 10px", flexShrink: 0 }}>
            <h2 style={{ margin: 0, fontSize: 22, fontWeight: 700, color: "var(--text)" }}>{title}</h2>
            <button onClick={onClose} style={{ width: 34, height: 34, borderRadius: "50%", border: "none", background: "var(--surface-2)", color: "var(--text-2)", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}><Icon name="x" size={19} /></button>
          </div>
        )}
        <div style={{ flex: 1, overflow: "auto", padding: "0 16px" }}>{children}</div>
        {footer && <div style={{ padding: "12px 16px max(30px, calc(var(--sab) + 14px))", flexShrink: 0, borderTop: "1px solid var(--hairline)", background: "var(--surface)" }}>{footer}</div>}
      </div>
    </div>
  );
}

// ── MOBILE SIGNING ───────────────────────────────────────────────────────────
function MSign({ doc, onBack, onApply }) {
  const t = DOC_TYPES[doc.type], field = t.field, p = senderOf(doc);
  const scrollRef = mUseRef(null);
  const pageRefs = mUseRef([]);
  const [placedByPage, setPlacedByPage] = mUseState({}); // { [page]: {x, y} } — one signature per page
  const [currentPage, setCurrentPage] = mUseState(0);    // page currently centered in the scroll viewport
  const [phase, setPhase] = mUseState("place"); // place | applying | done

  const signedPages = Object.keys(placedByPage).map(Number).sort((a, b) => a - b);
  const count = signedPages.length;
  const currentSigned = placedByPage[currentPage] != null;

  const coordsFrom = (page, cx, cy) => {
    const el = pageRefs.current[page]; if (!el) return null;
    const r = el.getBoundingClientRect();
    return { x: signClamp(((cx - r.left) / r.width) * 100), y: signClamp(((cy - r.top) / r.height) * 100) };
  };
  const placeOnPage = (page, x, y) => setPlacedByPage((prev) => ({ ...prev, [page]: { x, y } }));
  const removeFromPage = (page) => setPlacedByPage((prev) => { const n = { ...prev }; delete n[page]; return n; });

  // Detect which page is currently centered in the scroll viewport.
  const detectCurrentPage = mUseCallback(() => {
    const cont = scrollRef.current; if (!cont) return;
    const cr = cont.getBoundingClientRect();
    const mid = cr.top + cr.height / 2;
    let best = 0, bestDist = Infinity;
    pageRefs.current.forEach((el, i) => {
      if (!el) return;
      const r = el.getBoundingClientRect();
      const d = Math.abs((r.top + r.height / 2) - mid);
      if (d < bestDist) { bestDist = d; best = i; }
    });
    setCurrentPage((prev) => (prev === best ? prev : best));
  }, []);

  mUseEffect(() => {
    const cont = scrollRef.current; if (!cont) return;
    detectCurrentPage();
    cont.addEventListener("scroll", detectCurrentPage, { passive: true });
    window.addEventListener("resize", detectCurrentPage);
    return () => { cont.removeEventListener("scroll", detectCurrentPage); window.removeEventListener("resize", detectCurrentPage); };
  }, [detectCurrentPage]);

  const onArmedClick = (page) => (e) => {
    if (phase !== "place") return;
    const c = coordsFrom(page, e.clientX, e.clientY);
    if (c) placeOnPage(page, c.x, c.y);
  };
  const startDrag = (page) => (e) => {
    if (phase !== "place") return;
    e.stopPropagation();
    const move = (ev) => { ev.preventDefault(); const c = coordsFrom(page, ev.clientX, ev.clientY); if (c) placeOnPage(page, c.x, c.y); };
    const up = () => { window.removeEventListener("pointermove", move); window.removeEventListener("pointerup", up); };
    window.addEventListener("pointermove", move); window.addEventListener("pointerup", up);
  };
  // Auto-place in the recommended field on the CURRENT page — only if it isn't already signed.
  const signCurrentPage = () => {
    if (placedByPage[currentPage] != null) return;
    placeOnPage(currentPage, field.x, field.y);
  };
  const apply = () => { setPhase("applying"); setTimeout(() => setPhase("done"), 850); };

  const pages = Array.from({ length: doc.pages });

  return (
    <div style={{ position: "absolute", inset: 0, zIndex: 40, background: "var(--bg)", display: "flex", flexDirection: "column" }}>
      {/* header */}
      <div style={{ paddingTop: "max(50px, calc(var(--sat) + 12px))", paddingBottom: 12, paddingLeft: 12, paddingRight: 16, display: "flex", alignItems: "center", gap: 8, background: "var(--surface)", borderBottom: "1px solid var(--hairline)", flexShrink: 0 }}>
        <button className="mTap" onClick={onBack} style={{ display: "flex", alignItems: "center", gap: 2, border: "none", background: "transparent", color: "var(--accent)", fontFamily: "inherit", fontSize: 17, fontWeight: 500, cursor: "pointer", padding: 4 }}>
          <Icon name="chevR" size={22} style={{ transform: "rotate(180deg)" }} /> Назад
        </button>
        <div style={{ flex: 1, minWidth: 0, textAlign: "center" }}>
          <div style={{ fontSize: 16, fontWeight: 600, color: "var(--text)", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{doc.title}</div>
          <div style={{ fontSize: 12.5, color: "var(--text-3)" }}>{doc.id} · {t.label}</div>
        </div>
        <div style={{ width: 60 }} />
      </div>

      {/* doc preview — all pages, scroll to switch */}
      <div ref={scrollRef} style={{ flex: 1, overflow: "auto", padding: "20px 18px 28px", display: "flex", flexDirection: "column", gap: 22 }}>
        {pages.map((_, i) => (
          <div key={i}>
            <div style={{ fontSize: 12.5, fontWeight: 600, textAlign: "center", marginBottom: 8, display: "flex", alignItems: "center", justifyContent: "center", gap: 7, color: i === currentPage ? "var(--accent)" : "var(--text-3)" }}>
              Страница {i + 1} из {doc.pages}
              {placedByPage[i] && <span style={{ display: "inline-flex", alignItems: "center", gap: 4, color: "#1d7a36" }}><Icon name="checkCircle" size={13} /> подписана</span>}
            </div>
            <PageSheet ref={(el) => (pageRefs.current[i] = el)} doc={doc} field={field} armed={phase === "place"} onArmedMove={() => {}} onArmedClick={onArmedClick(i)}>
              {i === currentPage && !placedByPage[i] && phase === "place" && (
                <div className="mFieldPulse" style={{ position: "absolute", left: field.x + "%", top: field.y + "%", width: field.w + "%", transform: "translate(-50%,-50%)", pointerEvents: "none", border: "2px dashed var(--accent)", borderRadius: 8, height: 42, display: "flex", alignItems: "center", justifyContent: "center", background: "var(--accent-weak)" }}>
                  <span style={{ fontSize: 11, fontWeight: 700, color: "var(--accent)" }}>Поле для подписи</span>
                </div>
              )}
              {placedByPage[i] && (
                <div onClick={(e) => e.stopPropagation()} onPointerDown={startDrag(i)} style={{ position: "absolute", left: placedByPage[i].x + "%", top: placedByPage[i].y + "%", transform: "translate(-50%,-50%)", cursor: phase === "place" ? "grab" : "default", touchAction: "none" }}>
                  <div style={{ position: "relative", padding: "6px 12px", borderRadius: 8, border: phase === "place" ? "1.5px solid var(--accent)" : "1.5px solid transparent", background: phase === "place" ? "rgba(255,255,255,.5)" : "transparent" }}>
                    <SignatureMark small applied={phase === "done"} />
                    {phase === "place" && (
                      <button onClick={(e) => { e.stopPropagation(); removeFromPage(i); }} style={{ position: "absolute", top: -11, right: -11, width: 24, height: 24, borderRadius: "50%", border: "none", background: "#1d1d1f", color: "#fff", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}><Icon name="x" size={13} /></button>
                    )}
                  </div>
                </div>
              )}
            </PageSheet>
          </div>
        ))}
      </div>

      {/* bottom action bar */}
      {phase !== "done" ? (
        <div style={{ flexShrink: 0, background: "var(--surface)", borderTop: "1px solid var(--hairline)", padding: "12px 16px max(30px, calc(var(--sab) + 14px))", display: "flex", flexDirection: "column", gap: 10 }}>
          {/* current page indicator */}
          <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: ".04em", textTransform: "uppercase", color: "var(--text-3)" }}>Текущая страница</div>
              <div style={{ fontSize: 18, fontWeight: 700, color: "var(--text)", marginTop: 1 }}>{currentPage + 1} <span style={{ fontSize: 13, fontWeight: 500, color: "var(--text-3)" }}>из {doc.pages}</span></div>
            </div>
            <span style={{ display: "inline-flex", alignItems: "center", gap: 5, padding: "5px 11px", borderRadius: 999, fontSize: 12.5, fontWeight: 600, whiteSpace: "nowrap", background: currentSigned ? "rgba(52,199,89,.15)" : "rgba(120,120,128,.14)", color: currentSigned ? "#1d7a36" : "var(--text-3)" }}>
              {currentSigned ? <><Icon name="checkCircle" size={14} /> Подписана</> : "Не подписана"}
            </span>
          </div>
          {/* sign current page */}
          <MBtn kind="secondary" icon="pen" full disabled={currentSigned} onClick={signCurrentPage}>
            {currentSigned ? `Стр. ${currentPage + 1} уже подписана` : `Подписать стр. ${currentPage + 1}`}
          </MBtn>
          {/* apply */}
          <MBtn kind="primary" icon={phase === "applying" ? null : "checkCircle"} full disabled={!count || phase === "applying"} onClick={apply}>
            {phase === "applying" ? "Применение…" : count > 1 ? `Применить подпись (${count} стр.)` : "Применить подпись"}
          </MBtn>
          <p style={{ margin: 0, fontSize: 12.5, color: "var(--text-3)", textAlign: "center", display: "flex", alignItems: "center", justifyContent: "center", gap: 6 }}>
            {count ? <><TelegramGlyph size={15} /> Подписано {count} из {doc.pages} стр.</> : "Нажмите на страницу или подпишите её кнопкой"}
          </p>
        </div>
      ) : (
        <div className="sheetUp" style={{ flexShrink: 0, background: "var(--surface)", borderTop: "1px solid var(--hairline)", padding: "22px 20px max(30px, calc(var(--sab) + 14px))", textAlign: "center" }}>
          <div className="popIn" style={{ width: 64, height: 64, borderRadius: "50%", background: "#34c759", display: "inline-flex", alignItems: "center", justifyContent: "center", marginBottom: 12, boxShadow: "0 6px 18px rgba(52,199,89,.4)" }}><Icon name="check" size={34} stroke={2.6} style={{ color: "#fff" }} /></div>
          <div style={{ fontSize: 21, fontWeight: 700, color: "var(--text)", marginBottom: 4 }}>Документ подписан</div>
          <div style={{ fontSize: 14, color: "var(--text-2)", marginBottom: 12 }}>Подпись на {count} из {doc.pages} стр.</div>
          <div style={{ display: "inline-flex", alignItems: "center", gap: 8, padding: "8px 14px", borderRadius: 999, background: "rgba(34,158,217,.1)", marginBottom: 18 }}>
            <TelegramGlyph size={18} /><span style={{ fontSize: 13.5, color: "#1583b3", fontWeight: 600 }}>Уведомление в Telegram — {p.name}</span>
          </div>
          <MBtn kind="primary" full onClick={() => onApply(doc)}>Готово</MBtn>
        </div>
      )}
    </div>
  );
}

// ── SEND SHEET (staff) ───────────────────────────────────────────────────────
function SendSheet({ onClose, onSent, tgConnected }) {
  const [step, setStep] = mUseState(1);
  const [picked, setPicked] = mUseState(null);
  const [priority, setPriority] = mUseState("Обычный");
  const [comment, setComment] = mUseState("");
  const [preview, setPreview] = mUseState(false);

  const submit = () => {
    onSent({ id: "DOC-" + (2042 + Math.floor(Math.random() * 50)), title: picked.name.replace(/_/g, " ").replace(/\.pdf$/, ""), type: picked.type, status: "pending", when: "Только что", priority });
    setStep(3);
  };

  const footer = step === 1
    ? <MBtn kind="primary" full disabled={!picked} onClick={() => setStep(2)}>Далее</MBtn>
    : step === 2
      ? <div style={{ display: "flex", gap: 10 }}><MBtn kind="secondary" onClick={() => setStep(1)} style={{ flex: "0 0 auto" }}>Назад</MBtn><MBtn kind="primary" icon="send" full onClick={submit}>Отправить</MBtn></div>
      : <MBtn kind="primary" full onClick={onClose}>Готово</MBtn>;

  return (
    <>
    <MSheet onClose={onClose} title={step === 3 ? null : "Отправить на подпись"} footer={footer}>
      {step === 1 && (
        <div style={{ display: "flex", flexDirection: "column", gap: 10, paddingBottom: 12 }}>
          <div style={{ fontSize: 14, color: "var(--text-3)", padding: "2px 4px 4px" }}>Выберите файл с сервера</div>
          {SERVER_FILES.map((f) => {
            const t = DOC_TYPES[f.type], on = picked && picked.name === f.name;
            return (
              <button key={f.name} className="mTap" onClick={() => setPicked(f)} style={{ display: "flex", alignItems: "center", gap: 12, padding: 12, borderRadius: 14, cursor: "pointer", textAlign: "left", fontFamily: "inherit", width: "100%", border: on ? "2px solid var(--accent)" : "2px solid transparent", background: on ? "var(--accent-weak)" : "var(--surface)" }}>
                <DocGlyph type={f.type} size={38} />
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 14.5, fontWeight: 600, color: "var(--text)", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{f.name}</div>
                  <div style={{ fontSize: 12.5, color: "var(--text-3)" }}>{f.folder} · {f.size}</div>
                </div>
                <span style={{ width: 22, height: 22, borderRadius: "50%", border: on ? "none" : "2px solid var(--border)", background: on ? "var(--accent)" : "transparent", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>{on && <Icon name="check" size={13} stroke={3} style={{ color: "#fff" }} />}</span>
              </button>
            );
          })}
        </div>
      )}
      {step === 2 && picked && (
        <div style={{ display: "flex", flexDirection: "column", gap: 18, paddingBottom: 12 }}>
          <MCard onClick={() => setPreview(true)} style={{ display: "flex", alignItems: "center", gap: 13, cursor: "pointer" }}>
            <DocGlyph type={picked.type} size={44} />
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontSize: 15, fontWeight: 600, color: "var(--text)" }}>{picked.name}</div>
              <div style={{ fontSize: 13, color: "var(--text-3)" }}>{DOC_TYPES[picked.type].label} · {picked.size}</div>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 6, flexShrink: 0, fontSize: 13, fontWeight: 600, color: "var(--accent)" }}>
              <span>Открыть</span>
              <Icon name="chevR" size={16} style={{ color: "var(--accent)" }} />
            </div>
          </MCard>
          <div>
            <div style={MSecLabel}>Получатель</div>
            <MCard style={{ display: "flex", alignItems: "center", gap: 12 }}>
              <Avatar person={USERS.director} size={40} />
              <div style={{ flex: 1 }}><div style={{ fontSize: 15.5, fontWeight: 600, color: "var(--text)" }}>{USERS.director.name}</div><div style={{ fontSize: 13, color: "var(--text-3)" }}>{USERS.director.role}</div></div>
              <Icon name="checkCircle" size={20} style={{ color: "var(--accent)" }} />
            </MCard>
          </div>
          <div>
            <div style={MSecLabel}>Комментарий</div>
            <textarea value={comment} onChange={(e) => setComment(e.target.value)} placeholder="Добавьте комментарий для директора…"
              rows={3} style={{ width: "100%", padding: "14px 16px", borderRadius: 16, border: "1px solid var(--border)", background: "var(--surface)", fontSize: 15, fontFamily: "inherit", color: "var(--text)", resize: "none", outline: "none", lineHeight: 1.5, boxSizing: "border-box" }} />
          </div>
          <div>
            <div style={MSecLabel}>Приоритет</div>
            <div style={{ display: "flex", gap: 8 }}>
              {["Обычный", "Срочный"].map((pr) => (
                <button key={pr} className="mTap" onClick={() => setPriority(pr)} style={{ flex: 1, height: 50, borderRadius: 14, cursor: "pointer", fontFamily: "inherit", fontSize: 16, fontWeight: 600, border: priority === pr ? "2px solid var(--accent)" : "1px solid var(--border)", background: priority === pr ? "var(--accent-weak)" : "var(--surface)", color: priority === pr ? "var(--accent)" : "var(--text-2)" }}>{pr}</button>
              ))}
            </div>
          </div>
        </div>
      )}
      {step === 3 && (
        <div style={{ textAlign: "center", padding: "20px 10px 28px" }}>
          <div className="popIn" style={{ width: 72, height: 72, borderRadius: "50%", background: "#34c759", display: "inline-flex", alignItems: "center", justifyContent: "center", marginBottom: 16 }}><Icon name="check" size={38} stroke={2.6} style={{ color: "#fff" }} /></div>
          <h2 style={{ margin: "0 0 8px", fontSize: 22, fontWeight: 700, color: "var(--text)" }}>Отправлено</h2>
          <p style={{ margin: "0 auto 16px", maxWidth: 280, fontSize: 15, color: "var(--text-2)", lineHeight: 1.5 }}>{USERS.director.name} получит уведомление.</p>
          <div style={{ display: "inline-flex", alignItems: "center", gap: 8, padding: "9px 15px", borderRadius: 999, background: "rgba(34,158,217,.1)" }}><TelegramGlyph size={18} /><span style={{ fontSize: 13.5, color: "#1583b3", fontWeight: 600 }}>{tgConnected ? "Ответ придёт в Telegram" : "Подключите Telegram для ответов"}</span></div>
        </div>
      )}
    </MSheet>
    {preview && picked && (
      <div className="fadeIn" style={{ position: "absolute", inset: 0, zIndex: 90, background: "var(--bg)", display: "flex", flexDirection: "column" }}>
        <div style={{ paddingTop: "max(50px, calc(var(--sat) + 12px))", paddingBottom: 12, paddingLeft: 12, paddingRight: 16, display: "flex", alignItems: "center", gap: 8, background: "var(--surface)", borderBottom: "1px solid var(--hairline)", flexShrink: 0 }}>
          <button className="mTap" onClick={() => setPreview(false)} style={{ display: "flex", alignItems: "center", gap: 2, border: "none", background: "transparent", color: "var(--accent)", fontFamily: "inherit", fontSize: 17, fontWeight: 500, cursor: "pointer", padding: 4 }}>
            <Icon name="chevR" size={22} style={{ transform: "rotate(180deg)" }} /> Назад
          </button>
          <div style={{ flex: 1, minWidth: 0, textAlign: "center" }}>
            <div style={{ fontSize: 16, fontWeight: 600, color: "var(--text)", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{picked.name}</div>
            <div style={{ fontSize: 12.5, color: "var(--text-3)" }}>{DOC_TYPES[picked.type].label} · {picked.size}</div>
          </div>
          <div style={{ width: 60 }} />
        </div>
        <div style={{ flex: 1, overflow: "auto", padding: "20px 18px 28px" }}>
          <div style={{ background: "#fff", borderRadius: 12, boxShadow: "0 2px 20px rgba(0,0,0,.12)", overflow: "hidden", aspectRatio: "210/297", position: "relative" }}>
            <div style={{ position: "absolute", inset: 0, padding: "28px 24px", display: "flex", flexDirection: "column", fontSize: 11, color: "#333", lineHeight: 1.6 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 16 }}>
                <div style={{ fontWeight: 700, fontSize: 13, color: "#1d1d1f" }}>Caspian Engineering &amp; Research</div>
                <div style={{ fontSize: 10, color: "#8e8e93", textAlign: "right" }}>г. Актау, 17 мкрн., д. 38</div>
              </div>
              <div style={{ fontWeight: 700, fontSize: 15, color: "#1d1d1f", textAlign: "center", margin: "12px 0 16px" }}>{DOC_TYPES[picked.type].label}</div>
              <div style={{ flex: 1, display: "flex", flexDirection: "column", gap: 8 }}>
                {[...Array(8)].map((_, i) => <div key={i} style={{ height: 8, borderRadius: 4, background: "#e5e5ea", width: i === 7 ? "60%" : "100%" }} />)}
                <div style={{ marginTop: 12 }}>
                  {[...Array(5)].map((_, i) => <div key={i} style={{ height: 8, borderRadius: 4, background: "#e5e5ea", width: i === 4 ? "45%" : "100%", marginTop: 6 }} />)}
                </div>
              </div>
              <div style={{ marginTop: "auto", paddingTop: 16, borderTop: "1px solid #e5e5ea", display: "flex", justifyContent: "space-between", alignItems: "flex-end" }}>
                <div style={{ fontSize: 10, color: "#8e8e93" }}>Дата: _______________</div>
                <div style={{ fontSize: 10, color: "#8e8e93" }}>Подпись: _______________</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    )}
    </>
  );
}

// ── TELEGRAM SHEET ───────────────────────────────────────────────────────────
function TgSheet({ onClose, onConnected }) {
  const [phase, setPhase] = mUseState("intro");
  const open = () => { setPhase("connecting"); setTimeout(() => setPhase("done"), 1500); };
  return (
    <MSheet onClose={onClose} title={phase === "done" ? null : "Telegram"}>
      <div style={{ textAlign: "center", padding: "10px 6px 28px", display: "flex", flexDirection: "column", alignItems: "center" }}>
        {phase !== "done" ? (
          <>
            <div className="popIn" style={{ marginBottom: 16 }}><TelegramGlyph size={70} /></div>
            <h2 style={{ margin: "0 0 8px", fontSize: 21, fontWeight: 700, color: "var(--text)" }}>Подключить Telegram</h2>
            <p style={{ margin: "0 0 22px", fontSize: 15, color: "var(--text-2)", lineHeight: 1.5, maxWidth: 300 }}>Уведомления о документах будут приходить в Telegram с отметками о прочтении.</p>
            {phase === "intro" ? (
              <>
                <div style={{ width: "100%", background: "var(--surface)", borderRadius: 16, padding: 16, marginBottom: 20, textAlign: "left", display: "flex", flexDirection: "column", gap: 13 }}>
                  {[["1", `Откройте бота ${TELEGRAM.bot}`], ["2", "Нажмите «Запустить»"], ["3", "Аккаунт связан"]].map(([n, txt]) => (
                    <div key={n} style={{ display: "flex", alignItems: "center", gap: 12 }}>
                      <span style={{ width: 26, height: 26, borderRadius: "50%", background: "#229ED9", color: "#fff", fontWeight: 700, fontSize: 13, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>{n}</span>
                      <span style={{ fontSize: 14.5, color: "var(--text)" }}>{txt}</span>
                    </div>
                  ))}
                </div>
                <MBtn kind="primary" tg icon="send" full onClick={open}>Открыть в Telegram</MBtn>
              </>
            ) : (
              <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 14, padding: "6px 0 10px" }}>
                <div className="tgSpin" style={{ width: 36, height: 36, borderRadius: "50%", border: "3px solid rgba(34,158,217,.2)", borderTopColor: "#229ED9" }} />
                <span style={{ fontSize: 15, color: "var(--text-2)" }}>Ожидание подтверждения…</span>
              </div>
            )}
          </>
        ) : (
          <>
            <div className="popIn" style={{ position: "relative", marginBottom: 18 }}>
              <TelegramGlyph size={70} />
              <span style={{ position: "absolute", bottom: -4, right: -4, width: 28, height: 28, borderRadius: "50%", background: "#34c759", border: "3px solid var(--bg)", display: "flex", alignItems: "center", justifyContent: "center" }}><Icon name="check" size={15} stroke={3} style={{ color: "#fff" }} /></span>
            </div>
            <h2 style={{ margin: "0 0 8px", fontSize: 21, fontWeight: 700, color: "var(--text)" }}>Telegram подключён</h2>
            <p style={{ margin: "0 0 22px", fontSize: 15, color: "var(--text-2)", lineHeight: 1.5, maxWidth: 300 }}>Уведомления приходят в чат {TELEGRAM.bot}.</p>
            <MBtn kind="primary" full onClick={() => { onConnected(); onClose(); }}>Готово</MBtn>
          </>
        )}
      </div>
    </MSheet>
  );
}

// ── TAB BAR ──────────────────────────────────────────────────────────────────
function MTabBar({ tabs, active, onTab }) {
  return (
    <div style={{ flexShrink: 0, display: "flex", background: "rgba(252,252,253,.92)", backdropFilter: "blur(18px)", WebkitBackdropFilter: "blur(18px)", borderTop: "1px solid var(--hairline)", paddingBottom: "max(22px, calc(var(--sab) + 8px))", paddingTop: 8 }}>
      {tabs.map((tab) => {
        const on = active === tab.key;
        return (
          <button key={tab.key} className="mTap" onClick={() => onTab(tab)} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 3, border: "none", background: "transparent", cursor: "pointer", fontFamily: "inherit", padding: "4px 0", position: "relative" }}>
            <div style={{ position: "relative" }}>
              <Icon name={tab.icon} size={26} stroke={on ? 2 : 1.7} style={{ color: on ? "var(--accent)" : "var(--text-3)" }} />
              {tab.badge > 0 && <span style={{ position: "absolute", top: -4, right: -8, minWidth: 16, height: 16, padding: "0 4px", borderRadius: 999, background: "#ff3b30", color: "#fff", fontSize: 10.5, fontWeight: 700, display: "flex", alignItems: "center", justifyContent: "center" }}>{tab.badge}</span>}
            </div>
            <span style={{ fontSize: 10.5, fontWeight: on ? 600 : 500, color: on ? "var(--accent)" : "var(--text-3)" }}>{tab.label}</span>
          </button>
        );
      })}
    </div>
  );
}

// ── ROOT ─────────────────────────────────────────────────────────────────────
function MobileApp() {
  const [account, setAccount] = mUseState("director");
  const [screen, setScreen] = mUseState("queue");
  const [signingDoc, setSigningDoc] = mUseState(null);
  const [sheet, setSheet] = mUseState(null); // 'send' | 'tg' | null
  const [toast, setToast] = mUseState(null);
  const [tgStaff, setTgStaff] = mUseState(false);
  const [signedIds, setSignedIds] = mUseState([]);
  const [extraSigned, setExtraSigned] = mUseState([]);
  const [extraJournal, setExtraJournal] = mUseState([]);
  const [sentDocs, setSentDocs] = mUseState([]);
  const [extraRequests, setExtraRequests] = mUseState([]);
  const [openReq, setOpenReq] = mUseState(null);

  const user = USERS[account];
  const queue = QUEUE.filter((d) => !signedIds.includes(d.id));
  const signedAll = [...extraSigned, ...SIGNED];
  const journalAll = [...extraJournal, ...JOURNAL];
  const staffAll = [...sentDocs, ...STAFF_DOCS];

  const showToast = (m) => { setToast(m); setTimeout(() => setToast(null), 3000); };

  const switchAccount = (acc) => { setAccount(acc); setScreen(acc === "director" ? "queue" : "docs"); setSigningDoc(null); };

  const onApply = (doc) => {
    const sid = doc.id;
    setSignedIds((p) => [...p, sid]);
    setExtraSigned((p) => [{ ...doc, signed: "Только что", receipt: { state: "delivered", time: "" } }, ...p]);
    setExtraJournal((p) => [
      { id: "n" + sid + "a", title: doc.title, actor: "director", action: "signed", when: "Только что", detail: "Подпись добавлена · стр. 1" },
      { id: "n" + sid + "b", title: doc.title, actor: doc.from, action: "notified", when: "Только что", detail: "Уведомление в Telegram · доставлено" },
      ...p,
    ]);
    setSigningDoc(null); setScreen("queue");
    showToast("Подписано · уведомление в Telegram");
    setTimeout(() => {
      setExtraSigned((p) => p.map((d) => (d.id === sid ? { ...d, receipt: { state: "read", time: "сейчас" } } : d)));
      setExtraJournal((p) => p.map((j) => (j.id === "n" + sid + "b" ? { ...j, detail: "Уведомление в Telegram · прочитано" } : j)));
    }, 4500);
  };

  const onSent = (doc) => {
    setSentDocs((p) => [doc, ...p]);
    setExtraJournal((p) => [{ id: "s" + doc.id, title: doc.title, actor: "staff", action: "submitted", when: "Только что", detail: "Отправлено на подпись" }, ...p]);
  };

  const onSubmitRequest = (req) => {
    setExtraRequests((p) => [req, ...p]);
    setExtraJournal((p) => [{ id: "r" + req.id, title: LEAVE_TYPES[req.type].label, actor: "staff", action: "submitted", when: "Только что", detail: "Заявление в Отдел кадров" }, ...p]);
    showToast("Заявление отправлено");
  };
  const requestsAll = [...extraRequests, ...MY_REQUESTS];

  const dirTabs = [
    { key: "queue", icon: "tray", label: "Подпись", badge: queue.length },
    { key: "signed", icon: "checkCircle", label: "Подписано" },
    { key: "search", icon: "search", label: "Поиск", action: "search" },
    { key: "journal", icon: "clock", label: "Журнал" },
    { key: "profile", icon: "user", label: "Профиль" },
  ];
  const staffTabs = [
    { key: "docs", icon: "doc", label: "Документы" },
    { key: "requests", icon: "calendar", label: "Заявления" },
    { key: "search", icon: "search", label: "Поиск", action: "search" },
    { key: "journal", icon: "clock", label: "Журнал" },
    { key: "profile", icon: "user", label: "Профиль" },
  ];
  const tabs = account === "director" ? dirTabs : staffTabs;
  const onTab = (tab) => { if (tab.action === "send") setSheet("send"); else if (tab.action === "search") setSheet("search"); else { setScreen(tab.key); setSigningDoc(null); } };

  return (
    <IOSDevice>
      <div style={{ position: "relative", height: "100%", display: "flex", flexDirection: "column", background: "var(--bg)", overflow: "hidden" }}>
        <div style={{ flex: 1, display: "flex", flexDirection: "column", minHeight: 0 }}>
          {account === "director" && screen === "queue" && <MQueue queue={queue} onOpen={setSigningDoc} />}
          {account === "director" && screen === "signed" && <MSigned all={signedAll} />}
          {screen === "journal" && <MJournal items={journalAll} />}
          {account === "staff" && screen === "docs" && <MDocs all={staffAll} tgConnected={tgStaff} onConnectTg={() => setSheet("tg")} onSend={() => setSheet("send")} />}
          {account === "staff" && screen === "requests" && <MRequests requests={requestsAll} onNew={() => setSheet("leave")} onOpen={setOpenReq} />}
          {screen === "profile" && <MProfile account={account} user={user} onSwitch={switchAccount} tgConnected={account === "director" ? true : tgStaff} onConnectTg={() => setSheet("tg")} />}
        </div>

        <MTabBar tabs={tabs} active={screen} onTab={onTab} />

        {signingDoc && <MSign doc={signingDoc} onBack={() => setSigningDoc(null)} onApply={onApply} />}
        {sheet === "send" && <SendSheet onClose={() => setSheet(null)} onSent={onSent} tgConnected={tgStaff} />}
        {sheet === "leave" && <MLeaveSheet onClose={() => setSheet(null)} onSubmit={onSubmitRequest} />}
        {openReq && <MRequestDetail req={openReq} onClose={() => setOpenReq(null)} />}
        {sheet === "tg" && <TgSheet onClose={() => setSheet(null)} onConnected={() => setTgStaff(true)} />}
        {sheet === "search" && <MSearch queue={queue} signed={signedAll} journal={journalAll} onOpen={(doc) => { setSheet(null); setSigningDoc(doc); }} onClose={() => setSheet(null)} />}

        {toast && (
          <div className="toastIn" style={{ position: "absolute", top: 58, left: "50%", transform: "translateX(-50%)", zIndex: 90, display: "flex", alignItems: "center", gap: 9, padding: "11px 16px", borderRadius: 14, background: "rgba(28,28,30,.95)", color: "#fff", fontSize: 14, fontWeight: 500, boxShadow: "0 8px 24px rgba(0,0,0,.3)", maxWidth: "88%" }}>
            <span style={{ width: 20, height: 20, borderRadius: "50%", background: "#34c759", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}><Icon name="check" size={13} stroke={3} /></span>
            {toast}
          </div>
        )}
      </div>
    </IOSDevice>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<MobileApp />);

</script>
</body>
</html>
