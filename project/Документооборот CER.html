<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Документооборот — Caspian Engineering &amp; Research</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #f4f4f6;
    --surface: #ffffff;
    --surface-2: #fafafa;
    --ui-font: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", "Segoe UI", system-ui, sans-serif;
    --s: 1.12;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: var(--ui-font);
    background: var(--bg);
    color: #1d1d1f;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  #root { height: 100%; }
  button { font-family: inherit; -webkit-tap-highlight-color: transparent; }
  ::selection { background: color-mix(in srgb, var(--accent, #0a84ff) 22%, transparent); }

  /* tidy scrollbars */
  *::-webkit-scrollbar { width: 11px; height: 11px; }
  *::-webkit-scrollbar-thumb { background: rgba(0,0,0,.16); border-radius: 7px; border: 3px solid transparent; background-clip: content-box; }
  *::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,.28); background-clip: content-box; }
  *::-webkit-scrollbar-track { background: transparent; }

  .btn:hover { filter: brightness(1.04); }
  .btn:active { transform: translateY(.5px) scale(.992); }
  .rowItem:hover { background: var(--surface-2) !important; }
  .cardItem { transition: transform .14s ease, box-shadow .14s ease; }
  .cardItem:hover { transform: translateY(-3px); }

  @keyframes fieldPulse {
    0%, 100% { opacity: .85; transform: translate(-50%, -50%) scale(1); }
    50% { opacity: 1; transform: translate(-50%, -50%) scale(1.035); }
  }
  .fieldPulse { animation: fieldPulse 1.9s ease-in-out infinite; }

  @keyframes popIn { from { opacity: 0; transform: scale(.9); } to { opacity: 1; transform: scale(1); } }
  .popIn { animation: popIn .28s cubic-bezier(.2,.9,.3,1.2); }

  @keyframes modalIn { from { opacity: 0; transform: translateY(18px) scale(.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
  .modalIn { animation: modalIn .26s cubic-bezier(.2,.8,.3,1); }

  @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(16px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
  .toastIn { animation: toastIn .3s cubic-bezier(.2,.8,.3,1); }

  @keyframes tgSpin { to { transform: rotate(360deg); } }
  .tgSpin { animation: tgSpin .8s linear infinite; }

  @media (prefers-reduced-motion: reduce) {
    .fieldPulse, .popIn, .modalIn, .toastIn { animation: none; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="ui.jsx"></script>

<script type="text/babel" src="telegram.jsx"></script>

</body>
</html>
