  :root {

    --sat: env(safe-area-inset-top, 0px);

    --bg: #F2F2F7; --surface: #ffffff; --surface-2: #f4f4f6;

  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: var(--ui-font);
    background: #e7e7ec;
    color: #1d1d1f;

    display: flex; align-items: center; justify-content: center;

  *::-webkit-scrollbar { width: 0; height: 0; }

  /* Full-bleed device on real phones (matches IOSDevice's compact branch). */
  .ios-fill { width: 100vw; height: 100vh; height: 100dvh; }
  @media (max-width: 640px) {
    body { padding: 0; background: #F2F2F7; align-items: stretch; justify-content: stretch; }
    #root { display: block; width: 100%; height: 100dvh; }
  }

  @keyframes popIn { from { opacity: 0; transform: scale(.9); } to { opacity: 1; transform: scale(1); } }
  .popIn { animation: popIn .28s cubic-bezier(.2,.9,.3,1.2); }
  @keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(-12px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

  @keyframes fieldPulse { 0%,100% { opacity: .85; } 50% { opacity: 1; } }

const RU_MONTHS = ["января","февраля","марта","апреля","мая","июня","июля","августа","сентября","октября","ноября","декабря"];
const RU_MONTHS_SHORT = ["янв","фев","мар","апр","мая","июн","июл","авг","сен","окт","ноя","дек"];
function fmtRu(iso, short) {
  if (!iso) return "—";
  const [y, m, d] = iso.split("-").map(Number);
  return short ? `${d} ${RU_MONTHS_SHORT[m - 1]}` : `${d} ${RU_MONTHS[m - 1]} ${y}`;
}
function fmtRange(start, end) {
  if (!start || !end) return "—";
  const [, ms] = start.split("-").map(Number);
  const [, me] = end.split("-").map(Number);
  if (start === end) return fmtRu(start);
  // same month: "6 — 19 июля 2026"
  const [sy, , sd] = start.split("-").map(Number);
  const [ey, mm, ed] = end.split("-").map(Number);
  if (ms === me && sy === ey) return `${sd} — ${ed} ${RU_MONTHS[mm - 1]} ${ey}`;
  return `${fmtRu(start)} — ${fmtRu(end)}`;
}
function daysBetween(a, b) {
  if (!a || !b) return 0;
  const diff = Math.round((new Date(b) - new Date(a)) / 86400000) + 1;
  return diff > 0 ? diff : 0;
}
// Склонение: день / дня / дней
function plural(n, one, few, many) {
  const m10 = n % 10, m100 = n % 100;
  if (m10 === 1 && m100 !== 11) return one;
  if (m10 >= 2 && m10 <= 4 && (m100 < 10 || m100 >= 20)) return few;
  return many;
}
function daysLabel(n) { return `${n} ${plural(n, "день", "дня", "дней")}`; }

// ── The signature stamp (saved director signature, placeholder image) ────────
function SignatureMark({ small, applied, signer }) {
  return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", lineHeight: 1, pointerEvents: "none", userSelect: "none" }}>
      <span style={{ fontFamily: "'Caveat', cursive", fontSize: small ? "calc(30px * var(--s))" : "calc(40px * var(--s))", color: "#0b3b8c", transform: "rotate(-3deg)", whiteSpace: "nowrap" }}>А. Акботин</span>
      {applied && <span style={{ fontSize: "calc(9.5px * var(--s))", color: "#6e6e73", marginTop: 4, letterSpacing: ".02em" }}>Подписано · 04.06.2026</span>}
    </div>
  );
}

// ── Main signing view ────────────────────────────────────────────────────────
function SignDocument({ doc, onBack, onSigned }) {
  const t = DOC_TYPES[doc.type];
  const field = t.field;
  const p = senderOf(doc);
  const pageRefs = React.useRef([]);
  const canvasRef = React.useRef(null);
  const [placedByPage, setPlacedByPage] = React.useState({}); // { [page]: {x, y} } — one signature per page
  const [currentPage, setCurrentPage] = React.useState(0);    // page currently centered in the viewport
  const [armed, setArmed] = React.useState(false);
  const [ghost, setGhost] = React.useState(null);   // {page, x, y} crosshair preview
  const [drag, setDrag] = React.useState(null);     // {x, y} client coords (dragging stamp)
  const [phase, setPhase] = React.useState("place"); // place | applying | done

  const signedPages = Object.keys(placedByPage).map(Number).sort((a, b) => a - b);
  const currentSigned = placedByPage[currentPage] != null;

  const pageAtPoint = (cx, cy) => {
    for (let i = 0; i < pageRefs.current.length; i++) {
      const el = pageRefs.current[i];
      if (!el) continue;
      const r = el.getBoundingClientRect();
      if (cx >= r.left && cx <= r.right && cy >= r.top && cy <= r.bottom) return { page: i, rect: r };
    }
    return null;
  };

  // Detect which page is currently centered in the scroll viewport.
  const detectCurrentPage = React.useCallback(() => {
    const cont = canvasRef.current;
    if (!cont) return;
    const cr = cont.getBoundingClientRect();
    const mid = cr.top + cr.height / 2;
    let best = 0, bestDist = Infinity;
    pageRefs.current.forEach((el, i) => {
      if (!el) return;
      const r = el.getBoundingClientRect();
      const d = Math.abs((r.top + r.height / 2) - mid);
      if (d < bestDist) { bestDist = d; best = i; }
    });
    setCurrentPage((prev) => (prev === best ? prev : best));
  }, []);

  React.useEffect(() => {
    const cont = canvasRef.current;
    if (!cont) return;
    detectCurrentPage();
    cont.addEventListener("scroll", detectCurrentPage, { passive: true });
    window.addEventListener("resize", detectCurrentPage);
    return () => { cont.removeEventListener("scroll", detectCurrentPage); window.removeEventListener("resize", detectCurrentPage); };
  }, [detectCurrentPage]);

  const placeOnPage = (page, x, y) => setPlacedByPage((prev) => ({ ...prev, [page]: { x: clamp(x), y: clamp(y) } }));
  const removeFromPage = (page) => setPlacedByPage((prev) => { const n = { ...prev }; delete n[page]; return n; });

  // Drag the stamp from the panel onto a page.
  const startStampDrag = (e) => {
    e.preventDefault();
    setArmed(false);
    setDrag({ x: e.clientX, y: e.clientY });
    const move = (ev) => setDrag({ x: ev.clientX, y: ev.clientY });
    const up = (ev) => {
      window.removeEventListener("pointermove", move);
      window.removeEventListener("pointerup", up);
      setDrag(null);
      const hit = pageAtPoint(ev.clientX, ev.clientY);
      if (hit) placeOnPage(hit.page, ((ev.clientX - hit.rect.left) / hit.rect.width) * 100, ((ev.clientY - hit.rect.top) / hit.rect.height) * 100);
    };
    window.addEventListener("pointermove", move);
    window.addEventListener("pointerup", up);
  };

  // Reposition an already-placed signature within its own page.
  const startReposition = (page) => (e) => {
    e.preventDefault(); e.stopPropagation();
    const el = pageRefs.current[page];
    if (!el) return;
    const move = (ev) => {
      const r = el.getBoundingClientRect();
      placeOnPage(page, ((ev.clientX - r.left) / r.width) * 100, ((ev.clientY - r.top) / r.height) * 100);
    };
    const up = () => { window.removeEventListener("pointermove", move); window.removeEventListener("pointerup", up); };
    window.addEventListener("pointermove", move);
    window.addEventListener("pointerup", up);
  };

  const armedMove = (pageIdx) => (e) => {
    const r = pageRefs.current[pageIdx].getBoundingClientRect();
    setGhost({ page: pageIdx, x: ((e.clientX - r.left) / r.width) * 100, y: ((e.clientY - r.top) / r.height) * 100 });
  };
  const armedClick = (pageIdx) => (e) => {
    const r = pageRefs.current[pageIdx].getBoundingClientRect();
    placeOnPage(pageIdx, ((e.clientX - r.left) / r.width) * 100, ((e.clientY - r.top) / r.height) * 100);
    setArmed(false); setGhost(null);
  };

  // Auto-place the signature in the recommended field on the CURRENT page —
  // but only if that page doesn't already carry a signature.
  const signCurrentPage = () => {
    if (placedByPage[currentPage] != null) return; // already exists on this page
    placeOnPage(currentPage, field.x, field.y);
    setArmed(false);
  };

  const apply = () => {
    setPhase("applying");
    setTimeout(() => setPhase("done"), 850);
  };

  const pages = Array.from({ length: doc.pages });

  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100%", background: "var(--bg)" }}>
      {/* toolbar */}
      <div style={{ display: "flex", alignItems: "center", gap: 16, padding: "14px 22px", background: "var(--surface)", borderBottom: "1px solid var(--hairline)", flexShrink: 0 }}>
        <Button kind="ghost" size="sm" icon="back" onClick={onBack} style={{ marginLeft: -8 }}>Очередь</Button>
        <div style={{ width: 1, height: 26, background: "var(--hairline)" }} />
        <DocGlyph type={doc.type} size={32} />
        <div style={{ minWidth: 0 }}>
          <div style={{ fontSize: "calc(16px * var(--s))", fontWeight: 600, color: "var(--text)", whiteSpace: "nowrap" }}>{doc.title}</div>
          <div style={{ fontSize: "calc(13px * var(--s))", color: "var(--text-2)" }}>{doc.id} · {doc.pages} стр. · {doc.size}</div>
        </div>
        <div style={{ flex: 1 }} />
        <Button kind="secondary" size="sm" icon="download">Скачать</Button>
      </div>

      <div style={{ flex: 1, display: "flex", minHeight: 0 }}>
        {/* document canvas */}
        <div ref={canvasRef} style={{ flex: 1, overflow: "auto", padding: "32px clamp(20px, 5vw, 72px)" }}>
          <div style={{ display: "flex", flexDirection: "column", gap: 28, maxWidth: 640, margin: "0 auto" }}>
            {pages.map((_, i) => (
              <div key={i} style={{ position: "relative" }}>
                <div style={{ fontSize: "calc(12.5px * var(--s))", fontWeight: 600, marginBottom: 8, textAlign: "center", display: "flex", alignItems: "center", justifyContent: "center", gap: 8, color: i === currentPage ? "var(--accent)" : "var(--text-3)" }}>
                  Страница {i + 1} из {doc.pages}
                  {placedByPage[i] && <span style={{ display: "inline-flex", alignItems: "center", gap: 4, color: "#1d7a36" }}><Icon name="checkCircle" size={14} /> подписана</span>}
                </div>
                <PageSheet ref={(el) => (pageRefs.current[i] = el)} doc={doc} field={field}
                  armed={armed} onArmedMove={armedMove(i)} onArmedClick={armedClick(i)}>
                  {/* recommended field highlight on the current, not-yet-signed page */}
                  {i === currentPage && !placedByPage[i] && phase === "place" && (
                    <div style={{ position: "absolute", left: field.x + "%", top: field.y + "%", width: field.w + "%", transform: "translate(-50%, -50%)", pointerEvents: "none" }}>
                      <div className="fieldPulse" style={{ border: "2px dashed var(--accent)", borderRadius: 8, height: "calc(46px * var(--s))", display: "flex", alignItems: "center", justifyContent: "center", background: "var(--accent-weak)" }}>
                        <span style={{ fontSize: "calc(12px * var(--s))", fontWeight: 700, color: "var(--accent)" }}>Рекомендуемое поле</span>
                      </div>
                    </div>
                  )}
                  {/* armed crosshair ghost */}
                  {armed && ghost && ghost.page === i && (
                    <div style={{ position: "absolute", left: ghost.x + "%", top: ghost.y + "%", transform: "translate(-50%, -50%)", opacity: 0.55, pointerEvents: "none" }}>
                      <SignatureMark small />
                    </div>
                  )}
                  {/* placed signature for this page */}
                  {placedByPage[i] && (
                    <div onMouseDown={phase === "place" ? startReposition(i) : undefined}
                      style={{ position: "absolute", left: placedByPage[i].x + "%", top: placedByPage[i].y + "%", transform: "translate(-50%, -50%)", cursor: phase === "place" ? "grab" : "default" }}>
                      <div style={{ position: "relative", padding: "8px 14px", borderRadius: 8, border: phase === "place" ? "1.5px solid var(--accent)" : "1.5px solid transparent", background: phase === "place" ? "rgba(255,255,255,.5)" : "transparent" }}>
                        <SignatureMark applied={phase === "done"} />
                        {phase === "place" && (
                          <button onClick={(e) => { e.stopPropagation(); removeFromPage(i); }}
                            style={{ position: "absolute", top: -12, right: -12, width: 26, height: 26, borderRadius: "50%", border: "none", background: "#1d1d1f", color: "#fff", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", boxShadow: "0 2px 6px rgba(0,0,0,.25)" }}>
                            <Icon name="x" size={15} />
                          </button>
                        )}
                      </div>
                    </div>
                  )}
                </PageSheet>
              </div>
            ))}
          </div>
        </div>

        {/* right panel */}
        <aside style={{ width: 372, flexShrink: 0, background: "var(--surface)", borderLeft: "1px solid var(--hairline)", display: "flex", flexDirection: "column", overflow: "auto" }}>
          {phase === "done"
            ? <DonePanel doc={doc} sender={p} signedCount={signedPages.length} onBack={() => onSigned(doc, signedPages)} />
            : <PlacePanel {...{ doc, p, field, currentPage, currentSigned, signedPages, armed, setArmed, startStampDrag, signCurrentPage, apply, phase }} />}
        </aside>
      </div>

      {/* floating drag ghost */}
      {drag && (
        <div style={{ position: "fixed", left: drag.x, top: drag.y, transform: "translate(-50%, -50%) scale(1.05)", zIndex: 9999, pointerEvents: "none", filter: "drop-shadow(0 8px 16px rgba(0,0,0,.25))" }}>
          <SignatureMark />
        </div>
      )}
    </div>
  );
}

// ── Right panel: placement controls ──────────────────────────────────────────
function PlacePanel({ doc, p, field, currentPage, currentSigned, signedPages, armed, setArmed, startStampDrag, signCurrentPage, apply, phase }) {
  const applying = phase === "applying";
  const count = signedPages.length;
  return (
    <div style={{ padding: 24, display: "flex", flexDirection: "column", gap: 0, flex: 1 }}>
      <h2 style={{ margin: "0 0 4px", fontSize: "calc(22px * var(--s))", fontWeight: 700, color: "var(--text)" }}>Добавить подпись</h2>

<script type="text/babel">
// screens.jsx — Director and Staff screens (queue, history, journal, my docs, send flow).

// ── Reusable page header ─────────────────────────────────────────────────────
function PageHeader({ title, sub, count, children }) {

          {title}

        </h1>
        {sub && <p style={{ margin: "8px 0 0", fontSize: "calc(16px * var(--s))", color: "var(--text-2)" }}>{sub}</p>}

      <div style={{ display: "flex", alignItems: "center", gap: 12 }}>{children}</div>
    </div>
  );
}

// ── Search field ─────────────────────────────────────────────────────────────
function SearchField({ value, onChange, placeholder, showAt }) {
  const inputRef = React.useRef(null);
  const handleAt = () => {
    if (!value.includes("@")) onChange(value ? value + " @" : "@");
    else onChange(value);
    setTimeout(() => inputRef.current && inputRef.current.focus(), 0);
  };
  return (
    <div style={{ position: "relative", display: "flex", alignItems: "center", gap: 6 }}>
      <Icon name="search" size={19} style={{ position: "absolute", left: 13, color: "var(--text-3)", zIndex: 1 }} />
      <input ref={inputRef} value={value} onChange={(e) => onChange(e.target.value)} placeholder={placeholder}
        style={{ height: "calc(46px * var(--s))", padding: "0 16px 0 42px", borderRadius: 12, border: "1px solid var(--border)", background: "var(--surface)", fontSize: "calc(15px * var(--s))", fontFamily: "inherit", color: "var(--text)", width: 240, outline: "none" }} />
      {showAt && <button onClick={handleAt} title="Поиск по имени" style={{
        width: "calc(46px * var(--s))", height: "calc(46px * var(--s))", borderRadius: 12, border: "1px solid var(--border)",
        background: value.includes("@") ? "var(--accent-weak)" : "var(--surface)", cursor: "pointer",
        display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0,
        color: value.includes("@") ? "var(--accent)" : "var(--text-3)", fontFamily: "inherit", fontSize: "calc(18px * var(--s))", fontWeight: 700,
      }}>@</button>}
    </div>
  );
}

// ── Layout segmented control (mirrors the Tweak) ─────────────────────────────
function LayoutSwitch({ value, onChange }) {
  const opts = [["list", "list"], ["grid", "grid"], ["columns", "columns"]];
  return (
    <div style={{ display: "flex", gap: 2, padding: 3, background: "var(--surface-2)", border: "1px solid var(--border)", borderRadius: 12 }}>
      {opts.map(([key, icon]) => (
        <button key={key} onClick={() => onChange(key)} aria-label={key} style={{
          width: "calc(42px * var(--s))", height: "calc(38px * var(--s))", borderRadius: 9, border: "none", cursor: "pointer",
          display: "flex", alignItems: "center", justifyContent: "center",
          background: value === key ? "var(--surface)" : "transparent", color: value === key ? "var(--accent)" : "var(--text-3)",
          boxShadow: value === key ? "0 1px 3px rgba(0,0,0,.12)" : "none",
        }}>
          <Icon name={icon} size={20} />
        </button>
      ))}
    </div>
  );
}

// ════════════════ DIRECTOR: QUEUE ════════════════
function DirectorQueue({ queue = QUEUE, layout, setLayout, onOpen }) {
  const [q, setQ] = React.useState("");
  const [peek, setPeek] = React.useState(queue[0] ? queue[0].id : null);
  const docs = queue.filter((d) => (d.title + d.subtitle).toLowerCase().includes(q.toLowerCase()));
  return (
    <div>
      <PageHeader title="На подпись" count={queue.length} sub="Документы, ожидающие вашей подписи">
        <SearchField value={q} onChange={setQ} placeholder="Поиск документов" />
        <LayoutSwitch value={layout} onChange={setLayout} />
      </PageHeader>
      {docs.length === 0
        ? <Empty title="Ничего не найдено" sub="Измените поисковый запрос" />
        : layout === "list" ? <ListBrowser docs={docs} onOpen={onOpen} />
        : layout === "grid" ? <GridBrowser docs={docs} onOpen={onOpen} />
        : <ColumnsBrowser docs={docs} onOpen={onOpen} peek={peek} setPeek={setPeek} />}
    </div>
  );
}

// ════════════════ DIRECTOR: SIGNED HISTORY ════════════════
function SignedHistory({ extraSigned }) {
  const [q, setQ] = React.useState("");
  const all = [...(extraSigned || []), ...SIGNED];
  const filtered = q ? all.filter(d => {
    const ql = q.toLowerCase();
    const p = senderOf(d);
    // Support @name search
    const atMatch = ql.match(/@\s*(.+)/);
    if (atMatch) return p.name.toLowerCase().includes(atMatch[1].trim());
    return d.title.toLowerCase().includes(ql) || p.name.toLowerCase().includes(ql);
  }) : all;
  return (
    <div>
      <PageHeader title="Подписанные" sub="История подписанных документов и отметки о прочтении">
        <SearchField value={q} onChange={setQ} placeholder="Поиск документов" showAt />
      </PageHeader>
      <div style={{ background: "var(--surface)", borderRadius: 18, overflow: "hidden", boxShadow: "0 1px 2px rgba(0,0,0,.04), 0 0 0 .5px var(--border)" }}>
        {filtered.map((d, i) => {
          const p = senderOf(d);
          const t = DOC_TYPES[d.type];
          return (
            <div key={d.id + i} style={{ display: "flex", alignItems: "center", gap: 16, padding: "16px 20px", borderTop: i === 0 ? "none" : "1px solid var(--hairline)" }}>

              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: "calc(16px * var(--s))", fontWeight: 600, color: "var(--text)" }}>{d.title}</div>
                <div style={{ fontSize: "calc(14px * var(--s))", color: "var(--text-2)" }}>{p.name} · подписан {d.signed}</div>
              </div>
              {d.receipt && <ReadReceipt receipt={d.receipt} />}

            </div>

        {q && filtered.length === 0 && <div style={{ padding: "30px 20px", textAlign: "center", fontSize: "calc(15px * var(--s))", color: "var(--text-3)" }}>Ничего не найдено</div>}
      </div>
    </div>

}

// ════════════════ JOURNAL (audit log) ════════════════
const ACTION_META = {
  signed:    { icon: "checkCircle", tint: "#34c759", verb: "Подписан" },
  notified:  { icon: "bell",      tint: "#0a84ff", verb: "Уведомление" },
  submitted: { icon: "send",      tint: "#8e8e93", verb: "Отправлен" },
};
function journalDateKey(when) {
  // "Сегодня, 08:30" → "Сегодня", "2 июня, 15:20" → "2 июня"
  const comma = when.indexOf(",");
  return comma > -1 ? when.slice(0, comma) : when;
}

function Journal({ extra }) {
  const [q, setQ] = React.useState("");
  const allItems = [...(extra || []), ...JOURNAL];
  const items = q ? allItems.filter(j => {
    const ql = q.toLowerCase();
    const actor = USERS[j.actor] || PEOPLE[j.actor] || { name: j.actor };
    // Support @name search
    const atMatch = ql.match(/@\s*(.+)/);
    if (atMatch) return actor.name.toLowerCase().includes(atMatch[1].trim());
    return j.title.toLowerCase().includes(ql) || j.detail.toLowerCase().includes(ql) || actor.name.toLowerCase().includes(ql);
  }) : allItems;

  // Group by date, collecting all items per date key (preserving first-seen order)
  const dateOrder = [];
  const dateMap = {};
  for (const j of items) {
    const dk = journalDateKey(j.when);
    if (!dateMap[dk]) {
      dateMap[dk] = [];
      dateOrder.push(dk);
    }
    dateMap[dk].push(j);
  }
  const groups = dateOrder.map(dk => ({ date: dk, items: dateMap[dk] }));

  return (
    <div>
      <PageHeader title="Журнал" sub="Все действия с документами — кто, что и когда">
        <SearchField value={q} onChange={setQ} placeholder="Поиск по журналу" showAt />
      </PageHeader>
      <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
        {groups.map((g) => (
          <div key={g.date}>
            <div style={{ fontSize: "calc(13.5px * var(--s))", fontWeight: 600, color: "var(--text-3)", textTransform: "uppercase", letterSpacing: ".04em", padding: "0 6px 8px" }}>{g.date}</div>
            <div style={{ background: "var(--surface)", borderRadius: 18, padding: "8px 4px", boxShadow: "0 1px 2px rgba(0,0,0,.04), 0 0 0 .5px var(--border)" }}>
              {g.items.map((j) => {
                const m = ACTION_META[j.action];
                const actor = USERS[j.actor] || PEOPLE[j.actor] || { name: j.actor };
                const time = j.when.indexOf(",") > -1 ? j.when.slice(j.when.indexOf(",") + 2) : j.when;
                const dim = j.action === "notified";
                const t = j.type && DOC_TYPES[j.type];
                return (
                  <div key={j.id} style={{ display: "flex", alignItems: "center", gap: dim ? 12 : 16, padding: dim ? "8px 18px" : "14px 18px", position: "relative", opacity: dim ? 0.55 : 1 }}>
                    <div style={{ width: dim ? 32 : 42, height: dim ? 32 : 42, borderRadius: dim ? 8 : 11, background: dim ? "transparent" : `color-mix(in srgb, ${m.tint} 14%, transparent)`, color: dim ? "var(--text-3)" : m.tint, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                      {j.action === "notified" ? <TelegramGlyph size={dim ? 18 : 26} /> : <Icon name={m.icon} size={21} />}
                    </div>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8, fontSize: dim ? "calc(13.5px * var(--s))" : "calc(15.5px * var(--s))", color: dim ? "var(--text-2)" : "var(--text)" }}>
                        <span style={{ fontWeight: dim ? 400 : 600 }}>{m.verb}</span>
                        <span style={{ color: dim ? "var(--text-3)" : "var(--text-2)" }}>·</span>
                        <span style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", minWidth: 0 }}>{j.title}</span>
                      </div>
                      {!dim && <div style={{ fontSize: "calc(13.5px * var(--s))", color: "var(--text-2)" }}>{actor.name} · {j.detail}</div>}
                    </div>
                    <div style={{ display: "flex", alignItems: "center", gap: 10, flexShrink: 0 }}>
                      <span style={{ fontSize: "calc(12.5px * var(--s))", color: "var(--text-3)", whiteSpace: "nowrap" }}>{time}</span>
                      {t && !dim && <span style={{ display: "inline-flex", padding: "3px 9px", borderRadius: 999, background: `color-mix(in srgb, ${t.tint} 12%, transparent)`, color: t.tint, fontSize: "calc(12px * var(--s))", fontWeight: 600, whiteSpace: "nowrap" }}>{t.label}</span>}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        ))}
        {q && groups.length === 0 && <div style={{ padding: "30px 20px", textAlign: "center", fontSize: "calc(15px * var(--s))", color: "var(--text-3)" }}>Ничего не найдено</div>}
      </div>
    </div>
  );
}

// ════════════════ STAFF: MY DOCUMENTS ════════════════
const STAFF_DOCS = [
  { id: "DOC-2040", title: "Счёт за электроэнергию", type: "utility", status: "pending", when: "Сегодня, 08:51" },
  { id: "DOC-2037", title: "Счёт за водоснабжение",  type: "utility", status: "pending", when: "Вчера, 11:15" },
  { id: "DOC-2034", title: "Счёт за интернет и связь", type: "utility", status: "signed", when: "Вчера, 18:12" },
  { id: "DOC-2031", title: "Заявление на отпуск",     type: "leave",   status: "signed", when: "30 мая, 10:20" },
  { id: "DOC-2028", title: "Счёт за аренду склада",   type: "utility", status: "draft",  when: "Черновик" },

function StaffDocs({ onSend, sent, tgConnected, onConnectTelegram }) {

  return (
    <div>

        <div style={{ display: "flex", alignItems: "center", gap: 16, padding: "18px 20px", borderRadius: 16, marginBottom: 18, background: "rgba(34,158,217,.08)", border: "1px solid rgba(34,158,217,.25)" }}>
          <TelegramGlyph size={40} />
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontSize: "calc(16px * var(--s))", fontWeight: 600, color: "var(--text)" }}>Подключите Telegram</div>

        </div>
      )}

      <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
        {all.map((d, i) => {
          const t = DOC_TYPES[d.type];
          return (
            <div key={d.id + i} style={{ display: "flex", alignItems: "center", gap: 16, padding: "16px 20px", background: "var(--surface)", borderRadius: 16, boxShadow: "0 1px 2px rgba(0,0,0,.04), 0 0 0 .5px var(--border)" }}>

              <StatusBadge kind={d.status} />
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── Empty state ──────────────────────────────────────────────────────────────
function Empty({ title, sub }) {
  return (
    <div style={{ textAlign: "center", padding: "80px 20px", color: "var(--text-3)" }}>
      <div style={{ width: 64, height: 64, borderRadius: 18, background: "var(--surface)", display: "inline-flex", alignItems: "center", justifyContent: "center", marginBottom: 18, boxShadow: "0 0 0 .5px var(--border)" }}>
        <Icon name="tray" size={30} />
      </div>
      <div style={{ fontSize: "calc(19px * var(--s))", fontWeight: 600, color: "var(--text)", marginBottom: 6 }}>{title}</div>

function useCompactViewport() {

  const get = () => typeof window !== 'undefined' && window.matchMedia(query).matches;

// ── JOURNAL ──────────────────────────────────────────────────────────────────
function mJournalDateKey(when) {
  // "Сегодня, 08:30" → "Сегодня", "2 июня, 15:20" → "2 июня"
  const comma = when.indexOf(",");
  return comma > -1 ? when.slice(0, comma) : when;
}
function MJournal({ items }) {
  // Group by date, preserving first-seen order (items are newest-first)
  const dateOrder = [];
  const dateMap = {};
  for (const j of items) {
    const dk = mJournalDateKey(j.when);
    if (!dateMap[dk]) { dateMap[dk] = []; dateOrder.push(dk); }
    dateMap[dk].push(j);
  }
  const groups = dateOrder.map((dk) => ({ date: dk, items: dateMap[dk] }));

  return (
    <>
      <MHeader title="Журнал" sub="Действия с документами" />
      <div style={{ flex: 1, overflow: "auto", padding: "8px 16px 100px", display: "flex", flexDirection: "column", gap: 18 }}>
        {groups.map((g) => (
          <div key={g.date}>
            <div style={{ fontSize: 12.5, fontWeight: 700, letterSpacing: ".04em", textTransform: "uppercase", color: "var(--text-3)", padding: "0 6px 8px" }}>{g.date}</div>
            <MCard style={{ padding: "4px 0" }}>
              {g.items.map((j, i) => {
                const m = ACTION_META[j.action];
                const actor = USERS[j.actor] || PEOPLE[j.actor] || { name: j.actor };
                const time = j.when.indexOf(",") > -1 ? j.when.slice(j.when.indexOf(",") + 2) : j.when;
                return (
                  <div key={j.id} style={{ display: "flex", alignItems: "center", gap: 13, padding: "12px 16px", borderTop: i === 0 ? "none" : "1px solid var(--hairline)" }}>
                    <div style={{ width: 38, height: 38, borderRadius: 10, background: `color-mix(in srgb, ${m.tint} 14%, transparent)`, color: m.tint, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                      {j.action === "notified" ? <TelegramGlyph size={22} /> : <Icon name={m.icon} size={19} />}
                    </div>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontSize: 15, color: "var(--text)" }}><b style={{ fontWeight: 600 }}>{m.verb}</b> · {j.title}</div>
                      <div style={{ fontSize: 13, color: "var(--text-3)", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{actor.name} · {j.detail}</div>
                    </div>
                    <span style={{ fontSize: 12.5, color: "var(--text-3)", whiteSpace: "nowrap", flexShrink: 0 }}>{time}</span>
                  </div>
                );
              })}
            </MCard>
          </div>
        ))}
      </div>
    </>
  );
}
